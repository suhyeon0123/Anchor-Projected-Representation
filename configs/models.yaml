# =====================================================================
# Models used in ACS (Anchor-Projected Coordinate Space).
#
# best_layer: per-model selected layer L_m (see paper Section 4.2 and
#             Appendix Section "BEST_LAYER selection metric"). Selection is
#             performed once per model via an 8-fraction grid over depth
#             {1/8, ..., 7/8}, picking the layer that maximizes cross-family
#             intra-axis cosine similarity in the anchor coordinate space.
# =====================================================================

seed: 42

# Output root for activations, directions, detection/steering results.
# Override with --output-root flag in any script.
output_root: outputs

# Main study: 5 instruction-tuned dense families used for the paper's
# detection / steering / universal-similarity experiments.
models_main:
  llama8b:
    hf_id: meta-llama/Llama-3.1-8B-Instruct
    d_model: 4096
    n_layers: 32
    best_layer: 12       # 3/8
    dtype: bfloat16
  qwen7b:
    hf_id: Qwen/Qwen2.5-7B-Instruct
    d_model: 3584
    n_layers: 28
    best_layer: 18       # 5/8
    dtype: bfloat16
  mistral7b:
    hf_id: mistralai/Mistral-7B-Instruct-v0.3
    d_model: 4096
    n_layers: 32
    best_layer: 16       # 4/8
    dtype: bfloat16
  phi4:
    hf_id: microsoft/Phi-4
    d_model: 5120
    n_layers: 40
    best_layer: 20       # 4/8
    dtype: bfloat16
  gemma9b:
    hf_id: google/gemma-2-9b-it
    d_model: 3584
    n_layers: 42
    best_layer: 21       # 4/8
    dtype: bfloat16

# Scale-sweep variants used only for the family-scale sensitivity figure.
# All variants use a uniform 4/8 layer fraction (no per-model selection rerun).
models_scale:
  llama1b:
    hf_id: meta-llama/Llama-3.2-1B-Instruct
    d_model: 2048
    n_layers: 16
    best_layer: 8        # 4/8
    dtype: bfloat16
  llama3b:
    hf_id: meta-llama/Llama-3.2-3B-Instruct
    d_model: 3072
    n_layers: 28
    best_layer: 14       # 4/8
    dtype: bfloat16
  qwen1p5b:
    hf_id: Qwen/Qwen2.5-1.5B-Instruct
    d_model: 1536
    n_layers: 28
    best_layer: 14       # 4/8
    dtype: bfloat16
  qwen14b:
    hf_id: Qwen/Qwen2.5-14B-Instruct
    d_model: 5120
    n_layers: 48
    best_layer: 24       # 4/8
    dtype: bfloat16
  phi4_mini:
    hf_id: microsoft/Phi-4-mini-instruct
    d_model: 3072
    n_layers: 32
    best_layer: 16       # 4/8
    dtype: bfloat16
  gemma2b:
    hf_id: google/gemma-2-2b-it
    d_model: 2304
    n_layers: 26
    best_layer: 13       # 4/8
    dtype: bfloat16

# Default unseen target for the LQPG -> Mistral transfer setting.
default_unseen: mistral7b
